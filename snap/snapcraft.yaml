name: system-monitor
base: core24
version: '0.1.0'
title: System Monitor Dash
license: MIT
contact: https://github.com/gufonseca-code
summary: Monitor de Sistema feito em Flutter
description: |
  Um aplicativo para monitoramento de recursos do sistema,
  incluindo CPU, uso de disco, redes e processos.

grade: stable
confinement: strict

apps:
  system-monitor:
    command: system_monitor
    extensions: [gnome]
    plugs:
      - network
      - home
      - system-observe
      - hardware-observe
      - mount-observe

parts:
  system-monitor:
    plugin: flutter
    source: .
    flutter-target: lib/main.dart
    build-packages:
      - pkg-config
      - libgtk-3-dev
      - libglib2.0-dev